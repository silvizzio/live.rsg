<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RSG Live</title>
<style>
  :root{
    --bg:#0c1418; --water:#0e1b22; --land:#1b2730; --ink:#e7eef2; --muted:#8aa0ad;
    --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.18);
    --glass:rgba(16,26,32,.82); --glass2:rgba(20,32,40,.94);
    --accent:#7fd1c4; --safe:#43c08a; --watch:#e0a93c; --risk:#e5654b; --neutral:#7f93a0;
    --chip:rgba(255,255,255,.06);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:13px;overflow:hidden}
  .app{display:flex;flex-direction:column;height:100vh}

  .topbar{display:flex;align-items:center;gap:14px;height:46px;padding:0 14px;background:var(--glass2);border-bottom:1px solid var(--line);z-index:30}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600;letter-spacing:.3px}
  .brand .dot{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#2b4a52,#7fd1c4)}
  .brand small{display:block;font-weight:400;color:var(--muted);font-size:10px;letter-spacing:.2px}
  .topchips{display:flex;gap:6px;margin-left:6px}
  .tchip{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:3px 9px}
  .personas{display:flex;gap:4px;margin-left:auto}
  .ptab{font-size:11px;padding:6px 13px;border-radius:8px;border:1px solid var(--line);color:var(--muted);cursor:pointer;background:transparent;user-select:none}
  .ptab.on{color:#06121a;background:var(--accent);border-color:var(--accent);font-weight:600}
  .topright{display:flex;align-items:center;gap:12px;margin-left:14px}
  .lod{font-size:10px;border:1px solid var(--line2);border-radius:6px;padding:3px 7px;color:var(--muted)}
  .livestate{font-size:10px;display:flex;align-items:center;gap:6px;color:var(--muted)}
  .livestate .pip{width:7px;height:7px;border-radius:50%;background:var(--safe);box-shadow:0 0 0 3px rgba(67,192,138,.18);animation:pulse 2.4s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(67,192,138,.18)}50%{box-shadow:0 0 0 5px rgba(67,192,138,.05)}}
  .clock{font-variant-numeric:tabular-nums;color:var(--muted);font-size:11px}
  .vendor{font-size:10px;color:var(--muted);letter-spacing:.5px}

  /* body is a column: a stage row (which becomes columns at LOD3) + a bottom strip (LOD1/2) */
  .body{flex:1;display:flex;flex-direction:column;min-height:0}
  .stagerow{flex:1;display:grid;grid-template-columns:1fr;min-height:0}
  .app.lod3 .stagerow{grid-template-columns:300px 1fr 322px}
  .col{position:relative;min-height:0;overflow:hidden}

  /* left + right panels only exist at LOD3 */
  .leftpanel,.rightpanel{display:none;background:var(--glass);overflow:auto}
  .leftpanel{border-right:1px solid var(--line);padding:12px 12px 18px}
  .rightpanel{border-left:1px solid var(--line);padding:12px}
  .app.lod3 .leftpanel,.app.lod3 .rightpanel{display:block}

  .stage{background:radial-gradient(120% 90% at 60% 30%,#10222b 0%,var(--water) 55%,#091217 100%);overflow:hidden}
  .mapwrap{position:absolute;inset:0}
  svg.map{width:100%;height:100%;display:block}
  .island{fill:var(--land);stroke:rgba(255,255,255,.14);stroke-width:1.2}
  .gridline{stroke:rgba(255,255,255,.04);stroke-width:1}
  .pindot{stroke-width:1.4;cursor:pointer}
  .pindot.safe{fill:var(--safe);stroke:var(--safe)}
  .pindot.watch{fill:var(--watch);stroke:var(--watch)}
  .pindot.risk{fill:var(--risk);stroke:var(--risk)}
  .pinlbl{fill:var(--muted);font-size:9px;font-family:var(--font);pointer-events:none}
  .camglyph{fill:none;stroke:rgba(231,238,242,.6);stroke-width:1.1}

  .spotlayer{position:absolute;inset:0;pointer-events:none;z-index:5}
  .spot{position:absolute;transform:translate(-50%,-50%);background:var(--glass2);border:1px solid var(--line2);border-radius:7px;padding:4px 8px;white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.35)}
  .spot small{color:var(--muted);font-size:8px;display:block;letter-spacing:.3px;text-transform:uppercase}
  .spot b{font-size:10.5px;color:var(--ink)}
  .spot.watch{border-color:rgba(224,169,60,.5)} .spot.risk{border-color:rgba(229,101,75,.5)}

  /* floating LOD selector on the map */
  .lodsel{position:absolute;left:14px;top:14px;z-index:8;display:flex;gap:4px;background:var(--glass2);border:1px solid var(--line);border-radius:9px;padding:4px}
  .lodbtn{font-size:10.5px;padding:6px 11px;border-radius:6px;border:1px solid transparent;color:var(--muted);cursor:pointer;user-select:none;display:flex;flex-direction:column;align-items:center;gap:2px}
  .lodbtn small{font-size:8px;opacity:.7}
  .lodbtn:hover{background:var(--chip)}
  .lodbtn.on{background:rgba(127,209,196,.16);border-color:var(--accent);color:var(--ink)}
  .viewing{position:absolute;right:14px;top:14px;z-index:8;font-size:11px;border:1px solid var(--line2);border-radius:8px;padding:7px 11px;background:var(--glass2);color:var(--muted)}
  .viewing b{color:var(--ink);font-weight:600}
  .maphint{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;font-size:10px;color:var(--muted);background:var(--glass2);border:1px solid var(--line);border-radius:20px;padding:5px 12px}
  .app.lod3 .maphint{display:none}

  /* bottom strip (LOD1/2 read) */
  .bottomstrip{border-top:1px solid var(--line);background:var(--glass);padding:10px 14px;display:flex;align-items:stretch;gap:10px;overflow-x:auto;min-height:96px}
  .app.lod3 .bottomstrip{display:none}
  .striphead{flex:none;display:flex;flex-direction:column;justify-content:center;padding-right:12px;border-right:1px solid var(--line);min-width:150px}
  .striphead .sh-name{font-size:12px;font-weight:600;color:var(--ink)}
  .striphead .sh-lens{font-size:9.5px;color:var(--muted);margin-top:3px;line-height:1.35}
  .stripstat{display:inline-flex;align-items:center;gap:5px;font-size:9px;text-transform:uppercase;letter-spacing:.6px;margin-top:6px;border-radius:5px;padding:2px 7px;width:fit-content}
  .stripstat.safe{background:rgba(67,192,138,.16);color:var(--safe)}
  .stripstat.watch{background:rgba(224,169,60,.16);color:var(--watch)}
  .stripstat.risk{background:rgba(229,101,75,.16);color:var(--risk)}
  .stripcard{flex:none;min-width:112px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:rgba(255,255,255,.02);display:flex;flex-direction:column;justify-content:center}
  .stripcard .cl{font-size:9px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
  .stripcard .cv{font-size:14px;font-weight:600}
  .stripcard .cv small{font-size:10px;color:var(--muted);font-weight:400}
  .stripcard.hero{border-color:var(--line2);background:rgba(127,209,196,.06)}
  /* ops chips (MO) */
  .stripcard.op{min-width:140px}
  .stripcard.op .verdict{font-size:12px;font-weight:600}
  .stripcard.op.safe .verdict{color:var(--safe)} .stripcard.op.watch .verdict{color:var(--watch)} .stripcard.op.risk .verdict{color:var(--risk)}
  .stripcard.op .why{font-size:8.5px;color:var(--muted);margin-top:3px;line-height:1.3;white-space:normal}

  /* LOD3 left KPI panel */
  .sect{font-size:9.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--muted);margin:14px 2px 8px}
  .sect:first-child{margin-top:2px}
  .rotitle{margin:0 0 12px;padding-bottom:11px;border-bottom:1px solid var(--line)}
  .rotitle .rt-name{font-size:15px;font-weight:600;color:var(--ink);line-height:1.2}
  .rotitle .rt-sub{font-size:10.5px;color:var(--muted);margin-top:3px}
  .hero{border:1px solid var(--line2);border-radius:9px;padding:11px 12px;margin-bottom:9px;background:rgba(127,209,196,.06)}
  .hero .hl{font-size:10.5px;color:var(--muted);margin-bottom:3px}
  .hero .hv{font-size:24px;font-weight:600;line-height:1.05}
  .hero .hv small{font-size:12px;color:var(--muted);font-weight:400}
  .hero .delta{font-size:10.5px;color:var(--muted);margin-top:3px}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .kpi{border:1px solid var(--line);border-radius:7px;padding:8px 9px;background:rgba(255,255,255,.02)}
  .kpi .kl{font-size:9.5px;color:var(--muted);margin-bottom:3px}
  .kpi .kv{font-size:13px;font-weight:600}
  .kpi .kd{font-size:9px;margin-top:2px;color:var(--muted)}
  .kpi .kd.up{color:var(--safe)} .kpi .kd.down{color:var(--risk)}
  .alert{display:flex;align-items:flex-start;gap:9px;border:1px solid var(--line2);border-radius:8px;padding:9px 10px;margin-bottom:6px}
  .alert .dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex:none;background:var(--neutral)}
  .alert.watch{border-left:3px solid var(--watch)} .alert.watch .dot{background:var(--watch)}
  .alert.risk{border-left:3px solid var(--risk)} .alert.risk .dot{background:var(--risk)}
  .alert .at{font-size:11.5px;line-height:1.35}
  .alert .ah{font-size:9.5px;color:var(--muted);margin-top:2px}
  .simentry{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;font-weight:600;border:1px solid var(--accent);border-radius:9px;padding:10px 14px;background:rgba(127,209,196,.12);color:var(--accent);cursor:pointer;margin-top:14px}
  .simentry:hover{background:rgba(127,209,196,.2)}

  /* LOD3 right CCTV grid */
  .cctvhead{font-size:9.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--muted);margin:2px 2px 10px;display:flex;align-items:center;gap:6px}
  .cctvgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cam{position:relative;aspect-ratio:4/3;border:1px solid var(--line2);border-radius:7px;overflow:hidden;background:linear-gradient(135deg,#0e1a20,#132029)}
  .cam:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);pointer-events:none}
  .cam .cl{position:absolute;left:6px;bottom:5px;font-size:8.5px;color:var(--ink);text-shadow:0 1px 2px rgba(0,0,0,.6);z-index:2}
  .cam .live{position:absolute;right:6px;top:5px;font-size:7.5px;letter-spacing:.5px;color:var(--risk);display:flex;align-items:center;gap:3px;z-index:2}
  .cam .live b{width:5px;height:5px;border-radius:50%;background:var(--risk);animation:pulse 1.8s infinite}
  .cam .frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(231,238,242,.14);font-size:22px}
  .cam.wide{grid-column:1 / -1;aspect-ratio:16/6}

  .note{font-size:9.5px;color:var(--muted);line-height:1.5;border-top:1px solid var(--line);margin-top:11px;padding-top:9px}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="app lod1" id="app">

  <div class="topbar">
    <div class="brand"><span class="dot"></span><div>Red Sea Global<small>Shura Island Intelligence Operations Centre</small></div></div>
    <div class="topchips"><span class="tchip">Shura Island</span><span class="tchip" id="scopeChip">Shura Island</span></div>
    <div class="personas" id="personas">
      <button class="ptab on" data-p="GXM">GXM</button>
      <button class="ptab" data-p="OPS">OPS</button>
      <button class="ptab" data-p="ENV">ENV</button>
      <button class="ptab" data-p="MO">MO</button>
    </div>
    <div class="topright">
      <span class="lod" id="lodChip">LOD 1</span>
      <span class="livestate"><span class="pip"></span><span>Live</span></span>
      <span class="clock" id="clock">12:21:45 AST</span>
      <span class="vendor">iot&sup2; &nbsp;VIZZIO</span>
    </div>
  </div>

  <div class="body">
    <div class="stagerow">

      <div class="col leftpanel" id="leftPanel"></div>

      <div class="col stage">
        <div class="mapwrap">
          <svg class="map" viewBox="0 0 900 640" id="map" preserveAspectRatio="xMidYMid slice">
            <g id="gGrid"></g><g id="gIsland"></g><g id="gPins"></g>
          </svg>
          <div class="spotlayer" id="spotLayer"></div>
        </div>
        <div class="lodsel" id="lodSel">
          <div class="lodbtn on" data-lod="1">Destination<small>LOD 1</small></div>
          <div class="lodbtn" data-lod="2">Area<small>LOD 2</small></div>
          <div class="lodbtn" data-lod="3">Site<small>LOD 3</small></div>
        </div>
        <div class="viewing" id="viewing">Viewing <b>Shura Island</b></div>
        <div class="maphint" id="mapHint">Click a place to zoom in</div>
      </div>

      <div class="col rightpanel" id="rightPanel"></div>

    </div>

    <div class="bottomstrip" id="bottomStrip"></div>
  </div>
</div>

<script>
const ISLAND="M210,250 C250,180 360,150 470,170 C560,186 640,150 700,200 C760,250 740,330 690,360 C660,378 640,420 580,430 C520,440 470,470 410,452 C350,434 300,452 260,420 C214,384 232,330 215,300 C205,282 196,270 210,250 Z";

/* Live config. Each persona: scope, lens, a destination-level read (bottom strip at LOD1),
   and places. Each place carries an area read (bottom strip at LOD2) and a site read
   (LOD3 left panel) plus cameras (LOD3 right CCTV grid).
   ENV place reads include sustainability (per asset). MO destination read includes the
   operational-impact chips (wind -> marine). */
const LIVE = {
  GXM:{ scope:"Shura Island", label:"Guest Experience",
    lens:"Guest movement and transfers across the destination.",
    dest:{ status:"safe", hero:["Avg transfer wait","3.4","min","within the 6 min target"],
      kpis:[["Guests on the move","1,240"],["Transfer requests","38 open"],["Fleet in service","46 of 52"],["Satisfaction","4.4 of 5"]] },
    places:[
      {name:"Shura Marina", x:300,y:300, status:"watch",
       hero:["Transfer demand","214","vs 150 cap","11 vehicles free, oldest wait 8 min"],
       kpis:[["Boats in service","28 of 34"],["Oldest request","8 min"],["Wait at berth","Rising"],["Satisfaction","4.1 of 5"]],
       alerts:[["watch","Transfer demand above capacity","6 more boats would clear the backlog"]],
       cams:["Marina Promenade","Berth 4","Arrival Hall","Jetty East"]},
      {name:"Spine Corridor", x:470,y:320, status:"safe",
       hero:["Buggy load","5 of 6","seats","318 guests moving, flow smooth"],
       kpis:[["Buggies running","22"],["Avg wait","2.1 min"],["Flow","Smooth"],["Satisfaction","4.5 of 5"]],
       alerts:[["info","Corridor flowing normally","No pooling needed"]],
       cams:["Corridor Mid","Buggy Stop 2","North Gate"]},
      {name:"Villas", x:600,y:280, status:"safe",
       hero:["Arrival travel time","6.3","min","on target"],
       kpis:[["Groups arriving","4"],["Longest leg","Marina to villas"],["Flow","Smooth"],["Satisfaction","4.3 of 5"]],
       alerts:[["info","Arrivals on schedule","Marina to villas leg nominal"]],
       cams:["Villa Drop-off","Reception","Garden Path"]}
    ]
  },
  OPS:{ scope:"Shura Island", label:"Operations",
    lens:"Fleet, chargers, and site operations across the destination.",
    dest:{ status:"safe", hero:["Fleet utilization","74","%","18 of 24 buggies active"],
      kpis:[["Buggies in service","18 of 24"],["EV chargers free","84%"],["Safety flags","2 open"],["Idle assets","5"]] },
    places:[
      {name:"Turtle Bay", x:560,y:360, status:"watch",
       hero:["Fleet availability","18 of 24","at 2 of 6 seats","pooling frees about 6"],
       kpis:[["Chargers free","84%"],["Idle pods","1"],["Safety flags","Helmet, tailgating"],["Queue","4 sedans"]],
       alerts:[["watch","Buggies running under-filled","Pool reception trips to free about 6 vehicles"]],
       cams:["Bay Forecourt","Charger Row","Reception","Service Yard"]},
      {name:"Causeway", x:410,y:400, status:"risk",
       hero:["Buggy load","7 of 6","over capacity","helmet flags rising"],
       kpis:[["Safety flags","Rising"],["Bridge","Tailgating"],["Marshal","Not assigned"],["Queue","Building"]],
       alerts:[["risk","Over-capacity buggy on the causeway","Send a safety marshal to the queue"]],
       cams:["Causeway West","Bridge Deck","Queue Point"]},
      {name:"IOC Building", x:640,y:300, status:"safe",
       hero:["Floor temperature","22.3","C","nominal across plate"],
       kpis:[["Occupancy","Moderate"],["HVAC","Nominal"],["District cooling","Within load"],["Cameras","All reporting"]],
       alerts:[["info","Building interior nominal","HVAC and cooling within setpoints"]],
       cams:["L1 Floor Plate","L2 Floor Plate","Lobby","Plant Room"]}
    ]
  },
  ENV:{ scope:"Shura Island", label:"Environment",
    lens:"Air, wind, and water across the destination, plus per-asset sustainability.",
    dest:{ status:"safe", hero:["Water quality index","8.6","of 10","Clear"],
      kpis:[["Air quality","88, Moderate"],["Wind","3.6 m/s NW"],["Turbidity","2.4 NTU"],["Dissolved O2","96%"]] },
    places:[
      {name:"Shura Marina", x:300,y:300, status:"watch",
       hero:["Colour index","81","vs 94 baseline","probe LG-04 confirms"],
       kpis:[["Turbidity","3.1 NTU"],["Dissolved O2","91%"],["pH","8.02"],["Air quality","Nominal"]],
       alerts:[["watch","Water anomaly at Lagoon East","Send a marine team, colour index down to 81"]],
       cams:["Lagoon East","Reef Cam RB-01","Shoreline","Buoy LG-04"],
       sustain:[["Electricity","428,000 kWh","down 6%","down"],["Renewable share","82%","up 4 pts","up"],["Energy intensity","47 kWh/room-night","down 5%","down"],["Water use","3,940 m3","down 3%","down"],["Water intensity","430 L/guest-night","down 2%","down"],["Waste diverted","68%","up 7 pts","up"],["Est. CO2","61 t","down 9%","down"]]},
      {name:"SLS Red Sea", x:520,y:250, status:"risk",
       hero:["Restricted-area alert","2 people","in reef zone","1 min old"],
       kpis:[["Water quality","94"],["Camera","RB-02 live"],["Zone","Restricted reef"],["Response","Security called"]],
       alerts:[["risk","Unauthorized swimmers in a restricted reef zone","Security called, alert 1 minute old"]],
       cams:["Reef Zone RB-02","Beach North","Pier","Restricted Buoy"],
       sustain:[["Electricity","512,000 kWh","down 4%","down"],["Renewable share","79%","up 3 pts","up"],["Energy intensity","51 kWh/room-night","down 3%","down"],["Water use","4,610 m3","down 2%","down"],["Water intensity","455 L/guest-night","down 1%","down"],["Waste diverted","64%","up 5 pts","up"],["Est. CO2","74 t","down 6%","down"]]},
      {name:"Lagoon East", x:600,y:360, status:"watch",
       hero:["Monitoring assets","41 of 43","reporting","LG-04 offline 6 min"],
       kpis:[["Probe LG-04","Offline"],["Reef cam RB-01","Degraded"],["Air quality","Nominal"],["Wind","Nominal"]],
       alerts:[["watch","Monitoring gap at Lagoon East","Send a technician, probe LG-04 offline"]],
       cams:["Lagoon East","Reef Cam RB-01","Water Station","Shore"],
       sustain:[["Electricity","301,000 kWh","down 8%","down"],["Renewable share","85%","up 5 pts","up"],["Energy intensity","44 kWh/room-night","down 6%","down"],["Water use","2,980 m3","down 4%","down"],["Water intensity","410 L/guest-night","down 3%","down"],["Waste diverted","71%","up 6 pts","up"],["Est. CO2","48 t","down 11%","down"]]}
    ]
  },
  MO:{ scope:"North Reef", label:"Marine Operations",
    lens:"Reef conditions, dive and mooring capacity, and the weather's impact on operations.",
    dest:{ status:"watch", hero:["Water temperature","29.8","C","toward the 30.5 threshold"],
      kpis:[["Turbidity","4.6 NTU"],["Boats near reef","11 of 12"],["Moorings in use","17 of 18"],["Wind","14 kn"]],
      ops:[["Passenger boats","Caution","watch","Wind 14 kn, near the small-craft limit"],
           ["Seaplanes","Go","safe","Crosswind within limits, visibility clear"],
           ["Dive operations","Caution","watch","Turbidity 4.6 NTU, near the 5.0 limit"]] },
    places:[
      {name:"North Reef", x:500,y:300, status:"watch",
       hero:["Water temperature","29.8","C","toward 30.5 threshold"],
       kpis:[["Turbidity","4.6 NTU"],["Boats","11 of 12"],["Moorings","17 of 18"],["Wind","14 kn"]],
       alerts:[["watch","Temperature trending toward breach","Rest Site B, shift afternoon groups to Site C"]],
       cams:["Reef Cam RC-01","Mooring Field","Dive Platform","Surface Buoy"]},
      {name:"Site B", x:410,y:360, status:"risk",
       hero:["Turbidity","5.2","NTU","over the 5.0 threshold"],
       kpis:[["Boats at site","11"],["Dive status","Diverting"],["Response","Auto-assigned"],["Wind","15 kn"]],
       alerts:[["risk","Turbidity over threshold at Site B","Divert dive groups to Site C"]],
       cams:["Site B Reef","Dive Entry","Mooring B","Buoy B-02"]},
      {name:"Site C", x:600,y:340, status:"safe",
       hero:["Capacity","6 of 12","boats","room for arrivals"],
       kpis:[["Turbidity","3.4 NTU"],["Moorings","9 of 18"],["Dive status","Open"],["Wind","13 kn"]],
       alerts:[["info","Site C open with capacity","Receiving diverted groups from Site B"]],
       cams:["Site C Reef","Mooring C","Dive Platform"]}
    ]
  }
};

let persona="GXM", lod=1, placeIdx=0;
const $ = id => document.getElementById(id);
const sc = s => s==="risk"?"risk":s==="watch"?"watch":"safe";
const tagTxt = s => s==="risk"?"Action needed":s==="watch"?"Watch":"Stable";

function drawIsland(){
  let g="";
  for(let x=0;x<900;x+=45) g+=`<line class="gridline" x1="${x}" y1="0" x2="${x}" y2="640"/>`;
  for(let y=0;y<640;y+=45) g+=`<line class="gridline" x1="0" y1="${y}" x2="900" y2="${y}"/>`;
  $("gGrid").innerHTML=g;
  $("gIsland").innerHTML=`<path class="island" d="${ISLAND}"/>`;
}

function setViewBox(){
  const cfg=LIVE[persona];
  if(lod===1){ $("map").setAttribute("viewBox","0 0 900 640"); return; }
  const p=cfg.places[placeIdx];
  const w = lod===2 ? 520 : 300;
  const h = w/(900/640);
  let x = Math.max(0, Math.min(900-w, p.x - w/2));
  let y = Math.max(0, Math.min(640-h, p.y - h/2));
  $("map").setAttribute("viewBox",`${x} ${y} ${w} ${h}`);
}

function renderMap(){
  const cfg=LIVE[persona];
  let pins="";
  cfg.places.forEach((p,i)=>{
    const active=(lod>1 && i===placeIdx);
    const r = active?9:6;
    pins+=`<circle class="pindot ${sc(p.status)}" cx="${p.x}" cy="${p.y}" r="${r}" fill-opacity="${active?0.95:0.55}" data-place="${i}"/>`;
    pins+=`<text class="pinlbl" x="${p.x+12}" y="${p.y+4}">${p.name}</text>`;
  });
  $("gPins").innerHTML=pins;
  setViewBox();
  // spot bubble on the active place at LOD2/3
  const sl=$("spotLayer");
  if(lod>1){
    const p=cfg.places[placeIdx];
    const px=(p.x/900)*100, py=(p.y/640)*100;
    sl.innerHTML=`<div class="spot ${sc(p.status)}" style="left:${px}%;top:${py-7}%"><small>${p.name}</small><b>${p.hero[1]} ${p.hero[2]||''}</b></div>`;
  } else sl.innerHTML="";
}

function stripCards(read){
  let html=`<div class="stripcard hero"><div class="cl">${read.hero[0]}</div><div class="cv">${read.hero[1]} <small>${read.hero[2]||''}</small></div></div>`;
  html+=read.kpis.map(([l,v])=>`<div class="stripcard"><div class="cl">${l}</div><div class="cv">${v}</div></div>`).join("");
  return html;
}

function renderBottomStrip(){
  const cfg=LIVE[persona];
  const atArea = (lod===2);
  const read = atArea ? cfg.places[placeIdx] : cfg.dest;
  const name = atArea ? cfg.places[placeIdx].name : cfg.scope;
  const lens = atArea ? "Area read, scoped to this zone." : cfg.lens;
  const status = read.status || "safe";

  let head=`<div class="striphead"><div class="sh-name">${name}</div><div class="sh-lens">${lens}</div><span class="stripstat ${sc(status)}">${tagTxt(status)}</span></div>`;
  let cards = stripCards(read);
  // MO operational-impact chips on the destination read
  if(persona==="MO" && lod===1 && cfg.dest.ops){
    cards += cfg.dest.ops.map(([svc,verdict,cls,why])=>
      `<div class="stripcard op ${cls}"><div class="cl">${svc}</div><div class="verdict">${verdict}</div><div class="why">${why}</div></div>`
    ).join("");
  }
  $("bottomStrip").innerHTML = head + cards;
}

function renderLeftPanel(){
  const cfg=LIVE[persona], p=cfg.places[placeIdx];
  let h=`<div class="rotitle"><div class="rt-name">${p.name}</div><div class="rt-sub">${cfg.label} · single site, live</div></div>`;
  h+=`<div class="hero"><div class="hl">${p.hero[0]}</div><div class="hv">${p.hero[1]} <small>${p.hero[2]||''}</small></div><div class="delta">${p.hero[3]||''}</div></div>`;
  h+=`<div class="sect">Live readings</div><div class="kpis">`;
  h+=p.kpis.map(([l,v])=>`<div class="kpi"><div class="kl">${l}</div><div class="kv">${v}</div></div>`).join("");
  h+=`</div>`;
  if(persona==="ENV" && p.sustain){
    h+=`<div class="sect">Sustainability, this asset</div><div class="kpis">`;
    h+=p.sustain.map(([l,v,d,dir])=>`<div class="kpi"><div class="kl">${l}</div><div class="kv">${v}</div><div class="kd ${dir}">${d}</div></div>`).join("");
    h+=`</div>`;
  }
  h+=`<div class="sect">Alerts and activity</div>`;
  h+=(p.alerts||[]).map(([lvl,t,s])=>`<div class="alert ${lvl}"><span class="dot"></span><div><div class="at">${t}</div><div class="ah">${s}</div></div></div>`).join("");
  h+=`<button class="simentry" id="simEntry">Run simulation for ${p.name} &rarr;</button>`;
  $("leftPanel").innerHTML=h;
  const se=$("simEntry");
  if(se) se.addEventListener("click",()=>alert("Opening simulation for "+p.name+".\n\nIn the deployed product this hands off to the forecast tool (sim.rsg) scoped to this site."));
}

function renderRightPanel(){
  const cfg=LIVE[persona], p=cfg.places[placeIdx];
  const cams = p.cams||["Camera 1","Camera 2","Camera 3","Camera 4"];
  let h=`<div class="cctvhead">Camera feeds · ${p.name}</div><div class="cctvgrid">`;
  cams.forEach(c=>{
    h+=`<div class="cam"><div class="frame">&#9673;</div><div class="live"><b></b>LIVE</div><div class="cl">${c}</div></div>`;
  });
  h+=`</div><div class="note">Feeds shown are placeholders for this preview. In deployment these are the live CCTV and reef cameras nearest the selected site.</div>`;
  $("rightPanel").innerHTML=h;
}

function renderTop(){
  $("lodChip").textContent="LOD "+lod;
  $("scopeChip").textContent=LIVE[persona].scope;
  const name = lod>1 ? LIVE[persona].places[placeIdx].name : LIVE[persona].scope;
  $("viewing").innerHTML=`Viewing <b>${name}</b>`;
  document.querySelectorAll(".lodbtn").forEach(b=>b.classList.toggle("on", +b.dataset.lod===lod));
}

function render(){
  $("app").className = "app lod"+lod;
  renderMap();
  renderTop();
  if(lod===3){ renderLeftPanel(); renderRightPanel(); }
  else renderBottomStrip();
}

// interactions
document.querySelectorAll(".ptab").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".ptab").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); persona=b.dataset.p; lod=1; placeIdx=0; render();
}));
$("lodSel").addEventListener("click",e=>{
  const b=e.target.closest(".lodbtn"); if(!b) return;
  lod=+b.dataset.lod; render();
});
$("gPins").addEventListener("click",e=>{
  const t=e.target.closest("[data-place]"); if(!t) return;
  placeIdx=+t.dataset.place;
  if(lod===1) lod=2;         // first drill from destination goes to area
  else if(lod===2) lod=3;    // drilling again goes to the site
  render();
});

function tickClock(){
  const d=new Date();
  const p=n=>String(n).padStart(2,"0");
  $("clock").textContent=`${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())} AST`;
}
setInterval(tickClock,1000);

drawIsland(); render(); tickClock();
</script>
</body>
</html>
